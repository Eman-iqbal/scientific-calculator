<!DOCTYPE html>
<html>

<head>
    <title>Scientific Calculator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>



<body>
    <div class="container px-4 mt-3">
        <h1 class="text-center">Scientific Calculator</h1>
        <div class="row">
            <div class=" col-12 offset-md-3 col-md-6 card">
                <div class="card-body">
                    <input readonly class="form-control form-control-lg text-end" type="text" id="calc-display"
                        aria-label=".form-control-lg example">
                </div>
                <div class="row gx-2 px-3">
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            (
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            )
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            %
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            AC
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            7
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            8
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            9
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            ÷
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            4
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            5
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            6
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            ×
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            1
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            2
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            3
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            -
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            0
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            .
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-primary w-100 mb-2 border-primary">
                            =
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            +
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            sin
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            ln
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            π
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            cos
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            log
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            e
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            tan
                        </button>
                    </div>
                    <div class="col-3">
                        <button type="button" class="btn btn-light w-100 mb-2 border">
                            √
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Your JavaScript code to run after DOMContentLoaded event

            const display = document.getElementById("calc-display");
            const buttons = document.getElementsByClassName('btn')

            let currentvalue = "";
            function evaluateResult() {
                console.log('currentvalue:', currentvalue);
                const convertedvalue = currentvalue
                    .replace("×", "*")
                    .replace("÷", "/")
                    .replace("%", "*0.01")
                    .replace("sin", "Math.sin")
                    .replace("cos", "Math.cos")
                    .replace("ln", "Math.log")
                    .replace("π", "Math.PI")
                    .replace("log", "Math.log10")
                    .replace("e", "Math.E")
                    .replace("tan", "Math.tan")
                    .replace("√", "Math.sqrt")
                console.log("convertedvalue:", convertedvalue)
                const result = eval(convertedvalue);
                currentvalue = result.toString();
                display.value = currentvalue;
            }


            for (i = 0; i < buttons.length; i++) {
                const button = buttons[i];
                button.addEventListener('click', function () {
                    const value = button.innerText;
                    try {
                        if (value == "AC") {
                            currentvalue = "";
                            display.value = currentvalue;
                        } else if (value == "=") {
                            evaluateResult();
                        } else {
                            currentvalue += value;
                            console.log('currentvalue:', currentvalue);
                            display.value = currentvalue;
                        }

                    } catch (error){
                        console.error(error);
                        currentvalue = "ERROR";
                        display.value = currentvalue;
                    }


                });

            }

        });

    </script>

</body>

</html>
